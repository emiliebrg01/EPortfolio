<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>CV - {{prenom}} {{nom}}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 40px;
        }

        .cv {
            max-width: 800px;
            background-color: white;
            margin: auto;
            padding: 40px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-bottom: 5px;
        }

        h2 {
            border-bottom: 2px solid #333;
            padding-bottom: 5px;
            margin-top: 30px;
        }

        .header {
            text-align: center;
        }

        .contact {
            margin-top: 10px;
            font-size: 14px;
        }

        .section {
            margin-top: 20px;
        }

        .item {
            margin-bottom: 15px;
        }

        .item-title {
            font-weight: bold;
        }

        .item-date {
            float: right;
            font-style: italic;
            font-size: 14px;
        }

        .clear {
            clear: both;
        }
    </style>
</head>

<body>

    <div class="cv">

        <!-- EN-TÊTE -->
        <div class="header">
            <h1>{{prenom}} {{nom}}</h1>
            <div class="contact">
                📧 {{email}} | 📞 {{telephone}}
            </div>
        </div>

        <!-- EXPÉRIENCES -->
        <div class="section">
            <h2>Expériences professionnelles</h2>

            <!-- DÉBUT BOUCLE EXPÉRIENCE -->
            <div class="item">
                <div class="item-title">
                    {{poste}} – {{entreprise}}
                    <span class="item-date">{{date_debut}} – {{date_fin}}</span>
                </div>
                <div class="clear"></div>
                <p>{{description_experience}}</p>
            </div>
            <!-- FIN BOUCLE EXPÉRIENCE -->

        </div>

        <!-- FORMATIONS -->
        <div class="section">
            <h2>Formations</h2>

            <!-- DÉBUT BOUCLE FORMATION -->
            <div class="item">
                <div class="item-title">
                    {{diplome}} – {{etablissement}}
                    <span class="item-date">{{annee_debut}} – {{annee_fin}}</span>
                </div>
                <div class="clear"></div>
                <p>{{description_formation}}</p>
            </div>
            <!-- FIN BOUCLE FORMATION -->

        </div>

    </div>

</body>

</html>
